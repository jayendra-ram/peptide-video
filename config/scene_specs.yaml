    - 0.0
    - -2.0
  - start_time: 0.0
    end_time: 11.0
    text: 'Amide product: Gly-CO-NH-Gly (partial C=N double bond)'
    size: 0.09
    position:
    - -3.5
    - 0.0
    - -2.8
