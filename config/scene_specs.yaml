  visuals: "- Draw 4 repeating amide product units as a backbone chain (spaced 2.8 apart along X)\n- Golden highlight sphere\
    \ on the central amide bond (unit 1 C1-N2 midpoint)\n  - Semi-transparent emission material, strength 3.0, color #f1c40f"
  text_overlays:
  - start_time: 0.5
    end_time: 4.0
    text: What IS a peptide bond?
    size: 0.28
    position:
    - -3.0
    - 0.0
    - 3.5
  - start_time: 2.0
    end_time: 12.0
    text: 'Protein backbone: repeating -NH-CO- amide units'
    size: 0.1
    position:
