scene_07_resonance:
  label: Amide Resonance
  duration_seconds: 11.0
  visuals: "- Draw amide product\n- C-N resonance lobe (donor, purple) at C1-N2 midpoint\n  - Pulsing: 2-second cycle, scale\
    \ oscillates (0.4, 0.25, 0.3) to (0.15, 0.1, 0.12)\n- C=O resonance lobe (acceptor, orange) at C1-O1 midpoint\n  - Counter-pulsing:\
    \ shrinks when C-N grows, grows when C-N shrinks\n- N2 flattening animation: moves to z=0 between 20%–50% of scene, stays\
    \ flat"
  text_overlays:
  - start_time: 0.0
    end_time: 4.0
    text: C=O / C-N Resonance
    size: 0.16
    position:
    - -2.5
    - 0.0
    - 2.2
  - start_time: 4.4
    end_time: 8.8
    text: Planar Amide Bond
    size: 0.14
    position:
