    \ halos:\n  - C1 on glycine A: magnitude +0.35\n  - O1 on glycine A: magnitude -0.6\n  - N2 on glycine B: magnitude -0.4\n\
    - Curved arrow from N2 toward C1, color (1.0, 0.8, 0.0), arc height 0.8\n  - Fades in at 4.0s–5.5s"
