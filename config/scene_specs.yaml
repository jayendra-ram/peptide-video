  duration_seconds: 10.0
  visuals: "- Draw tetrahedral TS — bonds skipped (atoms animate)\n- Water departure: OH1 and H_OH fly to (3.0, 2.0, 1.5)\
    \ at 50% of scene, shrink to zero at 70%\n- Proton transfer: H_N2b moves toward OH1 position at 35%, then departs with\
    \ water\n- Remaining atoms settle toward amide product geometry at 85%\n  - Bezier easing on all keyframes"
