  visuals: "- Draw glycine A at offset (-1.0, 0, 0)\n- Draw glycine B at offset (0, 0, 0)\n- N lone pair lobe (donor, purple)\
    \ at N2 position, scale (0.3, 0.3, 0.5)\n  - Grows from zero at 2.0s to full at 4.0s\n- C=O pi* lobe (acceptor, orange)\
    \ at C1-O1 midpoint, scale (0.25, 0.4, 0.3)\n  - Grows from zero at 4.5s to full at 6.5s"
